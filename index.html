<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Slither.su</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at center, #0c1821, #070c10);
}

/* ФОН */
canvas {
    position: fixed;
    top: 0;
    left: 0;
}

/* Центр */
#menu {
    position: absolute;
    top: 44%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
}

/* ЛОГО */
#logo {
    font-size: 95px;
    font-weight: bold;
    background: linear-gradient(90deg, #58ff9a, #4ecbff, #a86bff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: glow 3s ease-in-out infinite alternate;
}
@keyframes glow {
    from { text-shadow: 0 0 10px rgba(0,255,150,0.2); }
    to { text-shadow: 0 0 40px rgba(0,255,150,0.6); }
}

/* Подсказка */
#hint {
    color: #7d6ca6;
    margin-top: 8px;
    font-size: 14.5px;
    opacity: 0.85;
}

/* Ник */
#nick {
    margin-top: 28px;
    width: 290px;
    padding: 14px 20px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(#5a4b7e, #3a2d58);
    color: white;
    text-align: center;
    font-size: 16px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5),
                0 0 10px rgba(150,100,255,0.2);
}

/* Кнопки */
.button-row {
    margin-top: 15px;
    display: flex;
    justify-content: center;
    gap: 12px;
    align-items: center;
}

#play {
    padding: 13px 42px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(#6fffb0, #3bc47a);
    color: white;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #2c9c63,
                0 10px 30px rgba(0,255,150,0.3);
    transition: 0.2s;
}

#play:hover {
    transform: scale(1.07);
}

#settings-btn {
    padding: 13px 16px;
    border-radius: 30px;
    border: none;
    background: #5a4b7e;
    color: white;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 5px 0 #3a2d58;
}

/* Настройки (выезжает вниз) */
#settings-panel {
    margin-top: 18px;
    background: rgba(20, 15, 40, 0.85);
    border-radius: 18px;
    padding: 15px 20px;
    width: 290px;
    display: none;
    text-align: left;
    font-size: 14px;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

#settings-panel label {
    display: block;
    margin: 9px 0;
    color: #c8b8ff;
}

/* Нижние элементы */
#skin {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: #69f0a8;
    font-size: 14px;
    opacity: 0.9;
    cursor: pointer;
}

#server {
    position: absolute;
    bottom: 20px;
    right: 20px;
    color: #69f0a8;
    font-size: 14px;
    cursor: pointer;
}

#quality {
    position: absolute;
    top: 15px;
    right: 20px;
    color: #b48cff;
    font-size: 13px;
    text-align: right;
}

/* Футер */
#footer {
    position: absolute;
    bottom: 8px;
    width: 100%;
    text-align: center;
    font-size: 12px;
    color: #6b6b6b;
}

#footer a {
    color: #888;
    text-decoration: none;
    margin: 0 6px;
}

#footer a:hover {
    color: #58ff9a;
}

/* Чат */
#chat_textbox {
    position: fixed;
    bottom: 15px;
    left: 20px;
    width: 300px;
    padding: 10px 16px;
    background: rgba(30,20,50,0.7);
    border: none;
    border-radius: 30px;
    color: white;
    z-index: 50;
}
</style>
<script src="https://api.agar.su/slith/smain.js"></script>
</head>
<body>

<div id="menu">
    <div id="logo">slither.su</div>
    <div id="hint">
        Когда станешь длиннее — зажми мышку для ускорения!
    </div>
    
    <input id="nick" placeholder="Nickname" maxlength="16">

    <div class="button-row">
        <button id="play" onclick="setNick(document.getElementById('nick').value)">
            Play
        </button>
        <button id="settings-btn" onclick="toggleSettings()">⚙</button>
    </div>

    <!-- Панель настроек -->
    <div id="settings-panel">
        <button onclick="setSpect(); return false;" style="width:100%; padding:10px; margin-bottom:12px; border-radius:30px; background:#f0ad4e; border:none; color:white; font-weight:bold;">
            Наблюдение (Spectate)
        </button>

        <label><input type="checkbox" onchange="setSkins(this.checked)"> Без скинов</label>
        <label><input type="checkbox" onchange="setNames(!this.checked)"> Без ников</label>
        <label><input type="checkbox" onchange="setDarkTheme(this.checked)"> Тёмная тема</label>
        <label><input type="checkbox" onchange="setColors(this.checked)"> Без цветов</label>
        <label><input type="checkbox" checked onchange="setShowMass(this.checked)"> Показывать массу</label>
        <label><input type="checkbox" onchange="setChatHide(this.checked)"> Закрыть чат</label>
    </div>
</div>

<div id="quality">Graphics:<br><b>High quality</b></div>
<div id="skin">🐍 Change Skin</div>
<div id="server">🌍 Choose Server</div>

<div id="footer">
    <a target="_blank" href="https://t.me/agarsu">Telegram</a> • 
    <a target="_blank" href="https://agar.su/privacy.html">privacy</a> • 
    <a target="_blank" href="https://agar.su/rules.html">rules</a>
</div>

<input id="chat_textbox" placeholder="Press Enter to chat" maxlength="200">

<script>
function toggleSettings() {
    const panel = document.getElementById('settings-panel');
    panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
}
</script>

</body>
</html>
