<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="Весёлая онлайн-игра: расти, обгоняй друзей и попади в топ!" />
  <meta name="robots" content="index, follow">
  <title>Змейки — весёлая онлайн-игра</title>
  <link id="favicon" rel="icon" type="image/png" href="./icon.png" />
  <link rel="apple-touch-icon" href="./icon.png" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,600,0,0&display=swap" />
  <script src="./js/vendor/pixi.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&display=swap');

:root {
  --sky-top: #43B1E4;
  --sky-mid: #43B1E4;
  --sky-bot: #43B1E4;
  --panel: rgba(255, 255, 255, 0.88);
  --panel-strong: rgba(255, 255, 255, 0.94);
  --ink: #1a3a4a;
  --ink-soft: #3d6a7c;
  --muted: #6a8fa0;
  --accent: #ff7a59;
  --accent-deep: #e85a38;
  --mint: #3ecf9a;
  --sun: #ffc94d;
  --me: #ff7a59;
  --me-bg: #fff0eb;
  --me-ring: #ffb399;
  --line: rgba(26, 58, 74, 0.12);
  --shadow: 0 12px 28px rgba(30, 80, 110, 0.18);
  --shadow-sm: 0 6px 16px rgba(30, 80, 110, 0.14);
  --radius-lg: 28px;
  --radius-md: 20px;
  --radius-sm: 14px;
  --blur: blur(16px);
  --transition: 0.22s ease;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Nunito', sans-serif;
  background: #43B1E4;
  color: var(--ink);
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  position: relative;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
}

/* Небо + облака только за первым меню */
#menu-sky {
  position: fixed;
  inset: 0;
  z-index: 5;
  pointer-events: none;
  overflow: hidden;
  background-color: #43B1E4;
  transition: opacity 0.85s ease-out;
}

#menu-sky .sky-haze {
  display: none;
}

#menu-sky .cloud {
  position: absolute;
  border-radius: 50%;
  background: #fff;
  opacity: 1;
  filter: none;
  box-shadow:
    36px 8px 0 -5px #fff,
    72px 2px 0 -1px #fff,
    104px 12px 0 -9px #fff,
    24px 20px 0 -3px #fff,
    64px 24px 0 -7px #fff,
    18px 28px 0 -2px #D1E9F5,
    52px 32px 0 -6px #D1E9F5,
    88px 26px 0 -8px #D1E9F5;
  animation: cloud-drift linear infinite;
  will-change: transform, opacity, filter;
}

#menu-sky .cloud.far {
  opacity: 0.92;
  filter: none;
  box-shadow:
    28px 6px 0 -4px #fff,
    56px 2px 0 -1px #fff,
    82px 10px 0 -7px #fff,
    20px 16px 0 -3px #fff,
    14px 22px 0 -2px #D1E9F5,
    44px 24px 0 -5px #D1E9F5;
}

#menu-sky .cloud.c1 { width: 70px; height: 70px; top: 10%; left: -150px; animation-duration: 52s; animation-delay: -10s; }
#menu-sky .cloud.c2 { width: 46px; height: 46px; top: 26%; left: -120px; animation-duration: 68s; animation-delay: -24s; opacity: 0.88; }
#menu-sky .cloud.c3 { width: 80px; height: 80px; top: 42%; left: -170px; animation-duration: 58s; animation-delay: -38s; }
#menu-sky .cloud.c4 { width: 38px; height: 38px; top: 62%; left: -100px; animation-duration: 74s; animation-delay: -14s; opacity: 0.82; }
#menu-sky .cloud.c5 { width: 60px; height: 60px; top: 16%; left: -140px; animation-duration: 60s; animation-delay: -42s; }
#menu-sky .cloud.c6 { width: 48px; height: 48px; top: 74%; left: -110px; animation-duration: 70s; animation-delay: -6s; opacity: 0.9; }
#menu-sky .cloud.c7 { width: 36px; height: 36px; top: 34%; left: -90px; animation-duration: 90s; animation-delay: -50s; }
#menu-sky .cloud.c8 { width: 52px; height: 52px; top: 54%; left: -130px; animation-duration: 82s; animation-delay: -18s; }

@keyframes cloud-drift {
  from { transform: translateX(0); }
  to { transform: translateX(calc(100vw + 300px)); }
}

/* Только облака разлетаются — небо остаётся на время PoW */
#menu-sky.is-scattering .cloud {
  animation: none !important;
  transition:
    transform 1.25s cubic-bezier(0.22, 0.61, 0.36, 1),
    opacity 1s ease-out,
    filter 1.15s ease-out;
  opacity: 0;
  filter: blur(20px);
}

#menu-sky.is-scattering .cloud.c1 { transform: translate(20vw, -30vh) scale(1.75); transition-delay: 0s; }
#menu-sky.is-scattering .cloud.c2 { transform: translate(-24vw, -16vh) scale(1.5); transition-delay: 0.04s; }
#menu-sky.is-scattering .cloud.c3 { transform: translate(28vw, 10vh) scale(1.9); transition-delay: 0.08s; }
#menu-sky.is-scattering .cloud.c4 { transform: translate(-18vw, 28vh) scale(1.45); transition-delay: 0.02s; }
#menu-sky.is-scattering .cloud.c5 { transform: translate(14vw, -38vh) scale(1.65); transition-delay: 0.1s; }
#menu-sky.is-scattering .cloud.c6 { transform: translate(-30vw, 16vh) scale(1.55); transition-delay: 0.06s; }
#menu-sky.is-scattering .cloud.c7 { transform: translate(8vw, -22vh) scale(1.4); transition-delay: 0.12s; }
#menu-sky.is-scattering .cloud.c8 { transform: translate(-12vw, 22vh) scale(1.6); transition-delay: 0.09s; }

/* Небо уходит только когда карта готова (после PoW) */
#menu-sky.is-fading {
  opacity: 0;
}

/* Подсказки платформ */
#platform-hint,
#tv-hint {
  position: fixed;
  left: 50%;
  bottom: 14px;
  transform: translateX(-50%);
  z-index: 70;
  padding: 8px 14px;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.9);
  border: 2px solid rgba(26, 58, 74, 0.12);
  font: 800 12px Nunito, sans-serif;
  color: #1a3a4a;
  pointer-events: none;
  white-space: nowrap;
}

#tv-exit-dialog {
  position: fixed;
  inset: 0;
  z-index: 300;
  display: grid;
  place-items: center;
  background: rgba(20, 50, 70, 0.45);
}

.tv-exit-card {
  background: var(--panel-strong);
  border: 3px solid #fff;
  border-radius: var(--radius-lg);
  padding: 28px 24px;
  box-shadow: var(--shadow);
  min-width: 280px;
  text-align: center;
}

.tv-exit-title {
  font-size: 22px;
  font-weight: 900;
  color: var(--ink);
  margin-bottom: 18px;
}

.tv-exit-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* ТВ: прячем ненужное */
body.platform-tv #hud-chat,
body.platform-tv #chat-compose,
body.platform-tv .hud-chat,
body.platform-tv #menu-rating,
body.platform-tv #mobile-controls {
  display: none !important;
}

body.platform-tv #name {
  pointer-events: none;
}

input, textarea {
  user-select: none;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
}

/* Без синего выделения текста */
::selection,
input::selection,
textarea::selection {
  background: transparent;
  color: inherit;
}
::-moz-selection,
input::-moz-selection,
textarea::-moz-selection {
  background: transparent;
  color: inherit;
}

/* Главное меню */
#user-interface {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 420px;
  max-width: 92vw;
  background: var(--panel-strong);
  border-radius: var(--radius-lg);
  padding: 40px 28px 32px;
  box-shadow: var(--shadow);
  border: 3px solid rgba(255, 255, 255, 0.95);
  z-index: 100;
  backdrop-filter: var(--blur);
}

.title {
  font-size: 52px;
  font-weight: 900;
  text-align: center;
  margin-bottom: 8px;
  color: var(--accent-deep);
  letter-spacing: -1px;
  text-shadow: 0 3px 0 rgba(255, 201, 77, 0.45);
}

.title-sub {
  text-align: center;
  font-size: 15px;
  font-weight: 700;
  color: var(--ink-soft);
  margin-bottom: 28px;
}

.input-group {
  margin-bottom: 18px;
}

input#name {
  width: 100%;
  padding: 16px 18px;
  border-radius: var(--radius-sm);
  border: 3px solid var(--line);
  background: #fff;
  color: var(--ink);
  font-family: inherit;
  font-size: 17px;
  font-weight: 700;
  outline: none;
  transition: var(--transition);
}

input#name:focus {
  border-color: var(--mint);
  box-shadow: 0 0 0 4px rgba(62, 207, 154, 0.25);
}

input#name::placeholder {
  color: var(--muted);
  font-weight: 600;
}

.button-group {
  display: flex;
  gap: 12px;
  margin-bottom: 18px;
}

.button {
  flex: 1;
  padding: 14px;
  background: #fff;
  border: 3px solid var(--line);
  border-radius: var(--radius-sm);
  text-align: center;
  font-size: 15px;
  font-weight: 800;
  color: var(--ink);
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}

.button:hover {
  border-color: var(--mint);
  transform: translateY(-2px);
  box-shadow: var(--shadow-sm);
}

.button:focus,
.button:focus-visible {
  outline: none;
  border-color: var(--mint);
  box-shadow: 0 0 0 4px rgba(62, 207, 154, 0.35);
}

.button:active {
  transform: translateY(0);
}

button.button {
  font: inherit;
  appearance: none;
  -webkit-appearance: none;
}

.primary-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

#play {
  background: linear-gradient(180deg, #ffd56a, var(--sun));
  color: #5a3a00;
  font-size: 18px;
  font-weight: 900;
  border: 3px solid #f0b820;
  box-shadow: 0 6px 0 #e0a810;
}

#play:hover {
  filter: brightness(1.05);
  box-shadow: 0 8px 0 #e0a810, var(--shadow-sm);
}

#spectate {
  background: linear-gradient(180deg, #8fe8c8, var(--mint));
  color: #0a4a35;
  border: 3px solid #2bb882;
  box-shadow: 0 6px 0 #249e70;
  font-weight: 900;
}

/* HUD */
.hud-element {
  position: absolute;
  border-radius: var(--radius-md);
  padding: 10px 14px;
  font-size: 14px;
  font-weight: 800;
  background: var(--panel);
  border: 2px solid rgba(255, 255, 255, 0.95);
  box-shadow: var(--shadow-sm);
  backdrop-filter: var(--blur);
  color: var(--ink);
  z-index: 1;
}

/* HUD: только очки слева снизу */
#score {
  top: auto;
  bottom: 12px;
  left: 12px;
  font-size: 16px;
  background: linear-gradient(135deg, #fff8e0, #ffe8a8);
  border-color: #f0c84a;
}

/* Лидерборд — всё видно сразу, без скролла */
#leaderboard {
  top: 12px;
  right: 12px;
  width: 200px;
  max-height: none;
  overflow: hidden;
  padding: 0;
  display: flex;
  flex-direction: column;
  pointer-events: none;
  z-index: 45;
}

#leaderboard .hud-panel-title {
  padding: 8px 10px 6px;
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 0.02em;
  border-bottom-width: 1px;
  gap: 6px;
}

#leaderboard .hud-panel-title::before {
  width: 8px;
  height: 8px;
  box-shadow: 0 0 0 2px rgba(255, 201, 77, 0.35);
}

#leaderboard-list {
  overflow: hidden;
  padding: 5px 6px 6px;
  scrollbar-width: none;
}

#leaderboard-list::-webkit-scrollbar {
  display: none;
}

#leaderboard .lb-row {
  display: grid;
  grid-template-columns: 22px 1fr;
  align-items: center;
  gap: 6px;
  padding: 3px 6px;
  margin-bottom: 2px;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.45);
  border: 1px solid transparent;
  min-height: 0;
  transform: none;
  box-shadow: none;
}

#leaderboard .lb-row.lb-top1 {
  background: linear-gradient(135deg, #fff6d0, #ffe9a0);
  border-color: #f0c84a;
}

#leaderboard .lb-row.lb-me {
  background: var(--me-bg);
  border-color: var(--me);
  box-shadow: none;
  transform: none;
}

#leaderboard .lb-row.lb-me.lb-top1 {
  background: linear-gradient(135deg, #ffe0d0, #ffc98a);
  border-color: var(--accent-deep);
}

#leaderboard .lb-rank {
  width: 20px;
  height: 20px;
  font-size: 12px;
  font-weight: 900;
  border-radius: 50%;
  background: #e8f4fa;
  color: var(--ink-soft);
}

#leaderboard .lb-top1 .lb-rank {
  background: var(--sun);
  color: #5a3a00;
}

#leaderboard .lb-me .lb-rank {
  background: var(--me);
  color: #fff;
}

#leaderboard .lb-name-wrap {
  min-width: 0;
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 5px;
}

#leaderboard .lb-name {
  font-size: 13px;
  font-weight: 800;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--ink);
}

#leaderboard .lb-badge {
  flex-shrink: 0;
  font-size: 9px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  color: #fff;
  background: var(--me);
  padding: 1px 5px;
  border-radius: 4px;
  line-height: 1.35;
}

#leaderboard .lb-empty {
  padding: 10px 6px;
  font-size: 12px;
}

#leaderboard .lb-sep {
  height: 1px;
  margin: 4px 2px;
  padding: 0;
  border: 0;
  background: rgba(26, 58, 74, 0.18);
  font-size: 0;
  line-height: 0;
  opacity: 1;
  letter-spacing: 0;
}

/* Рейтинг — высота под топ-5, при раскрытии скролл внутри без роста */
.menu-rating {
  position: fixed;
  top: 50%;
  left: calc(50% + min(210px, 46vw) + 20px);
  transform: translateY(-50%);
  width: 240px;
  z-index: 40;
  background: rgba(255, 255, 255, 0.88);
  border: 2px solid var(--line);
  border-radius: var(--radius-md);
  overflow: hidden;
  text-align: left;
  display: flex;
  flex-direction: column;
  box-shadow: 0 8px 24px rgba(40, 60, 90, 0.12);
  height: auto;
}

.menu-rating[hidden] {
  display: none !important;
}

.menu-rating-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 12px 12px 10px 14px;
  font-size: 15px;
  font-weight: 900;
  border-bottom: 2px solid var(--line);
  color: var(--ink);
  flex-shrink: 0;
}

.menu-rating-toggle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 34px;
  flex-shrink: 0;
  border: 2px solid var(--line);
  border-radius: 50%;
  background: #fff;
  color: var(--ink-soft);
  cursor: pointer;
  padding: 0;
  font-family: inherit;
  box-shadow: 0 2px 0 rgba(26, 58, 74, 0.08);
  transition: background var(--transition), border-color var(--transition), color var(--transition), transform 0.15s ease;
}

.menu-rating-toggle .material-symbols-outlined {
  font-size: 22px;
  font-variation-settings: "FILL" 0, "wght" 600, "GRAD" 0, "opsz" 24;
  line-height: 1;
  transition: transform 0.22s ease;
}

.menu-rating[data-expanded="1"] .menu-rating-toggle .material-symbols-outlined {
  transform: rotate(180deg);
}

.menu-rating-toggle:hover:not(:disabled) {
  background: #fff8e0;
  border-color: #f0c84a;
  color: var(--ink);
}

.menu-rating-toggle:active:not(:disabled) {
  transform: scale(0.94);
}

.menu-rating-toggle:disabled {
  opacity: 0.35;
  cursor: default;
}

#rating-list {
  flex: none;
  /* ровно 5 строк: padding 8*2 + 5×(строка ~44 + margin 4) − последний margin */
  height: calc(16px + 5 * 48px - 4px);
  overflow-x: hidden;
  overflow-y: hidden;
  padding: 4px 4px 8px 8px;
  overscroll-behavior: contain;
}

/* Скролл только когда список раскрыт */
.menu-rating[data-expanded="1"] #rating-list {
  overflow-y: auto;
}

/* Мини-скролл: чат и рейтинг одинаковые */
#chat-content,
.menu-rating[data-expanded="1"] #rating-list {
  scrollbar-width: thin;
  scrollbar-color: #f0c84a rgba(255, 201, 77, 0.2);
}

#chat-content::-webkit-scrollbar,
.menu-rating[data-expanded="1"] #rating-list::-webkit-scrollbar {
  width: 5px;
}

#chat-content::-webkit-scrollbar-track,
.menu-rating[data-expanded="1"] #rating-list::-webkit-scrollbar-track {
  margin: 2px 0;
  background: rgba(255, 201, 77, 0.16);
  border-radius: 999px;
}

#chat-content::-webkit-scrollbar-thumb,
.menu-rating[data-expanded="1"] #rating-list::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, #ffe08a, #f0c84a 55%, #e0a810);
  border-radius: 999px;
  border: 1px solid rgba(255, 255, 255, 0.8);
  min-height: 24px;
}

#chat-content::-webkit-scrollbar-thumb:hover,
.menu-rating[data-expanded="1"] #rating-list::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, #ffe9a8, #ffd056 55%, #f0b820);
}

#chat-content::-webkit-scrollbar-corner,
.menu-rating[data-expanded="1"] #rating-list::-webkit-scrollbar-corner {
  background: transparent;
}

#rating-list .lb-row {
  background: rgba(255, 255, 255, 0.65);
}

#rating-list .lb-lvl {
  color: var(--accent-deep);
  font-size: 13px;
}

#rating-list .lb-ya {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  margin-top: 1px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.hud-panel-title {
  padding: 12px 14px 8px;
  font-size: 15px;
  font-weight: 900;
  color: var(--ink);
  border-bottom: 2px solid var(--line);
  display: flex;
  align-items: center;
  gap: 8px;
}

.hud-panel-title::before {
  content: "";
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--sun);
  box-shadow: 0 0 0 3px rgba(255, 201, 77, 0.35);
  flex-shrink: 0;
}

/* Общие строки списка (рейтинг в меню и т.п.) */
.lb-row {
  display: grid;
  grid-template-columns: 28px 1fr auto;
  align-items: center;
  gap: 6px;
  padding: 8px 10px;
  margin-bottom: 4px;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.55);
  border: 2px solid transparent;
  transition: var(--transition);
}

.lb-row.lb-top1 {
  background: linear-gradient(135deg, #fff6d0, #ffe9a0);
  border-color: #f0c84a;
}

.lb-row.lb-me {
  background: var(--me-bg);
  border-color: var(--me);
  box-shadow: 0 0 0 3px rgba(255, 122, 89, 0.2);
  transform: scale(1.02);
}

.lb-row.lb-me.lb-top1 {
  background: linear-gradient(135deg, #ffe0d0, #ffc98a);
  border-color: var(--accent-deep);
}

.lb-rank {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: #e8f4fa;
  font-size: 13px;
  font-weight: 900;
  color: var(--ink-soft);
}

.lb-top1 .lb-rank {
  background: var(--sun);
  color: #5a3a00;
}

.lb-me .lb-rank {
  background: var(--me);
  color: #fff;
}

.lb-name-wrap {
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.lb-name {
  font-size: 14px;
  font-weight: 800;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--ink);
}

.lb-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: #fff;
  background: var(--me);
  padding: 1px 7px;
  border-radius: 999px;
  width: fit-content;
  line-height: 1.5;
}

.lb-lvl {
  font-size: 11px;
  font-weight: 800;
  color: var(--muted);
  white-space: nowrap;
}

.lb-empty {
  padding: 16px 10px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}

.lb-sep {
  text-align: center;
  font-size: 12px;
  font-weight: 900;
  color: var(--muted);
  letter-spacing: 2px;
  padding: 2px 0 4px;
  opacity: 0.7;
  user-select: none;
}

/* Чат — только сообщения, левый верх (скрыт, пока пусто) */
.hud-chat {
  z-index: 1;
  position: absolute;
  top: 12px;
  left: 12px;
  bottom: auto;
  width: min(340px, calc(100vw - 280px));
  max-height: min(230px, 30vh);
  background: rgba(255, 255, 255, 0.55);
  border: 2px solid rgba(255, 255, 255, 0.75);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  pointer-events: none;
  user-select: none;
  -webkit-user-select: none;
}

.hud-chat[hidden] {
  display: none !important;
}

#chat-content {
  flex: 1 1 auto;
  min-height: 0;
  max-height: min(230px, 30vh);
  padding: 8px 10px;
  overflow-y: auto;
  overflow-x: hidden;
  font-size: 14px;
  line-height: 1.4;
  color: var(--ink-soft);
  pointer-events: auto;
}

.hud-message-tile {
  margin-bottom: 3px;
  padding: 3px 6px;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.35);
  text-shadow: none;
}

.hud-message-item {
  font-weight: 800;
  word-break: break-word;
}

.hud-message {
  color: var(--ink);
  font-weight: 700;
}

/* Инпут чата по Enter — центр, чуть выше низа */
#chat-compose {
  position: fixed;
  left: 50%;
  bottom: max(72px, 12vh);
  transform: translateX(-50%);
  width: min(420px, calc(100vw - 32px));
  z-index: 60;
  padding: 14px 18px;
  border: 3px solid rgba(255, 255, 255, 0.95);
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.94);
  box-shadow: var(--shadow);
  color: var(--ink);
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  outline: none;
}

#chat-compose[hidden] {
  display: none !important;
}

#chat-compose::placeholder {
  color: var(--muted);
  font-weight: 600;
}

/* Миникарта */
#minimap-grid {
  position: absolute;
  width: 180px;
  height: 180px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(5, 1fr);
  pointer-events: none;
  opacity: 0.75;
  font-size: 10px;
  font-weight: 800;
  bottom: 12px;
  right: 12px;
  z-index: 1;
  border-radius: 16px;
  overflow: hidden;
  border: 2px solid rgba(255, 255, 255, 0.9);
  box-shadow: var(--shadow-sm);
  background: rgba(255, 255, 255, 0.35);
}

.cell {
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(26, 58, 74, 0.45);
  border: 0.5px solid rgba(26, 58, 74, 0.08);
}

.hud-minimap {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

#view {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  background: transparent;
  touch-action: none;
}

/* Модалки */
#modals-container {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  justify-content: center;
  align-items: center;
  overflow: auto;
}

.modal-background {
  position: fixed;
  inset: 0;
  background: rgba(40, 90, 120, 0.35);
}

.modal {
  position: relative;
  background: var(--panel-strong);
  border-radius: var(--radius-lg);
  border: 3px solid #fff;
  padding: 20px;
  box-shadow: var(--shadow);
  min-width: 240px;
  max-width: 90vw;
  z-index: 201;
  animation: modalFadeIn 0.25s ease;
  color: var(--ink);
}

@keyframes modalFadeIn {
  from { opacity: 0; transform: scale(0.94); }
  to { opacity: 1; transform: scale(1); }
}

.modal-header {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 10px;
}

.modal-close {
  cursor: pointer;
  font-size: 22px;
  color: var(--muted);
  transition: var(--transition);
  font-weight: 900;
}

.modal-close:hover {
  color: var(--accent);
}

.modal-settings-content {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.modal-settings-tile {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  font-size: 15px;
  font-weight: 800;
  color: var(--ink);
  padding: 10px 12px;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.7);
}

.modal-settings-tile input[type="checkbox"] {
  width: 22px;
  height: 22px;
  accent-color: var(--mint);
  cursor: pointer;
}

.modal-servers-content {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.modal-servers-tile {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 8px;
}

.round {
  background: #fff;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  text-align: center;
  font-weight: 800;
  border: 2px solid var(--line);
}

@media (max-width: 900px) {
  #user-interface {
    width: min(340px, calc(100vw - 20px));
    padding: 22px 16px 18px;
    max-height: calc(100dvh - 16px - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px));
    overflow-y: auto;
    border-radius: 22px;
  }

  .title { font-size: 30px; margin-bottom: 4px; }
  .title-sub { font-size: 12px; margin-bottom: 14px; }
  input#name { padding: 12px 14px; font-size: 15px; }
  .button { padding: 11px 12px; font-size: 14px; }
  #play { font-size: 16px; }

  /* Рейтинг в меню на мобилке скрыт */
  .menu-rating {
    display: none !important;
  }

  /* Чат — чуть больше текста */
  .hud-chat {
    top: calc(8px + env(safe-area-inset-top, 0px));
    left: calc(8px + env(safe-area-inset-left, 0px));
    bottom: auto;
    width: min(210px, 54vw);
    max-height: min(170px, 26vh);
    z-index: 40;
    background: rgba(255, 255, 255, 0.58);
    border-radius: 14px;
  }
  #chat-content {
    max-height: min(170px, 26vh);
    padding: 6px 8px;
    font-size: 12px;
    line-height: 1.35;
  }
  .hud-message-tile { margin-bottom: 2px; padding: 2px 4px; border-radius: 6px; }

  #chat-compose {
    bottom: max(96px, 14vh);
    width: min(340px, calc(100vw - 24px));
    padding: 12px 14px;
    font-size: 15px;
  }

  /* Инфо — только очки слева снизу */
  #score {
    top: auto;
    bottom: calc(8px + env(safe-area-inset-bottom, 0px));
    left: calc(8px + env(safe-area-inset-left, 0px));
    font-size: 12px;
    padding: 5px 8px;
    border-radius: 12px;
    z-index: 40;
  }

  /* Топ — правый верх, всё видно без скролла (5 + своя позиция) */
  #leaderboard {
    top: calc(8px + env(safe-area-inset-top, 0px));
    right: calc(8px + env(safe-area-inset-right, 0px));
    width: min(128px, 38vw);
    max-height: none;
    border-radius: 12px;
  }
  #leaderboard .hud-panel-title {
    font-size: 10px;
    padding: 5px 6px 3px;
  }
  #leaderboard-list { padding: 3px 4px 4px; }
  #leaderboard .lb-row {
    padding: 1px 3px;
    margin-bottom: 1px;
    border-radius: 5px;
    gap: 3px;
    grid-template-columns: 14px 1fr;
  }
  #leaderboard .lb-rank { width: 14px; height: 14px; font-size: 9px; }
  #leaderboard .lb-name { font-size: 10px; }
  #leaderboard .lb-badge { font-size: 7px; padding: 0 3px; }
  #leaderboard .lb-sep { margin: 2px 1px; }

  #minimap-grid {
    width: 72px;
    height: 72px;
    bottom: auto;
    top: calc(176px + env(safe-area-inset-top, 0px));
    right: calc(8px + env(safe-area-inset-right, 0px));
    opacity: 0.5;
    border-radius: 10px;
    font-size: 7px;
  }

  body.mobile-play #minimap-grid {
    top: calc(176px + env(safe-area-inset-top, 0px));
    bottom: auto;
    right: calc(8px + env(safe-area-inset-right, 0px));
  }
}

/* Мобильные контролы */
#mobile-controls {
  position: fixed;
  inset: 0;
  z-index: 30;
  pointer-events: none;
  touch-action: none;
}

#mobile-controls[hidden] {
  display: none !important;
}

.mobile-stick {
  pointer-events: none;
  position: fixed;
  width: 112px;
  height: 112px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.22);
  border: 2px solid rgba(255, 255, 255, 0.7);
  box-shadow: 0 6px 18px rgba(30, 80, 110, 0.16);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 31;
}

.mobile-stick[hidden] {
  display: none !important;
}

.mobile-stick-knob {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 46px;
  height: 46px;
  margin: -23px 0 0 -23px;
  border-radius: 50%;
  background: linear-gradient(180deg, #ffe08a, #f0c84a 55%, #e0a810);
  border: 2px solid rgba(255, 255, 255, 0.95);
  box-shadow: 0 3px 0 #d4980c, 0 6px 12px rgba(224, 168, 16, 0.3);
  will-change: transform;
}

/* Курсор направления — маленький цветной квадрат */
.mobile-cursor {
  pointer-events: none;
  position: fixed;
  width: 10px;
  height: 10px;
  margin: -5px 0 0 -5px;
  border: none;
  border-radius: 2px;
  background: var(--accent);
  box-shadow: none;
  z-index: 32;
  opacity: 0.9;
}

.mobile-split {
  pointer-events: auto;
  position: absolute;
  right: calc(14px + env(safe-area-inset-right, 0px));
  bottom: calc(18px + env(safe-area-inset-bottom, 0px));
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 2px solid rgba(255, 255, 255, 0.95);
  background: linear-gradient(180deg, #8fe8c8, var(--mint));
  color: #0a4a35;
  font-family: inherit;
  font-size: 13px;
  font-weight: 900;
  letter-spacing: -0.02em;
  box-shadow: 0 5px 0 #249e70, 0 8px 16px rgba(36, 158, 112, 0.32);
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  z-index: 33;
}

.mobile-split.is-active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 #249e70, 0 4px 10px rgba(36, 158, 112, 0.28);
  filter: brightness(0.96);
}

@media (min-width: 901px) and (pointer: fine) {
  #mobile-controls { display: none !important; }
}

/* Статистика после смерти */
.death-stats {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: max(12px, env(safe-area-inset-top, 0px)) max(12px, env(safe-area-inset-right, 0px)) max(12px, env(safe-area-inset-bottom, 0px)) max(12px, env(safe-area-inset-left, 0px));
  background: rgba(20, 50, 70, 0.28);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  overflow-y: auto;
  user-select: none;
  -webkit-user-select: none;
}

.death-stats[hidden] {
  display: none !important;
}

.death-stats-card {
  width: min(460px, 100%);
  background: rgba(255, 255, 255, 0.94);
  border: 2px solid rgba(255, 255, 255, 0.98);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  padding: 22px 22px 18px;
  text-align: center;
}

.death-stats-title {
  font-size: 28px;
  font-weight: 900;
  color: var(--ink);
  margin-bottom: 4px;
  letter-spacing: -0.02em;
}

.death-stats-sub {
  font-size: 14px;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 16px;
}

.death-stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}

.death-stat {
  background: rgba(232, 244, 250, 0.85);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 10px 6px 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.death-stat:nth-child(1) {
  background: linear-gradient(160deg, #fff6d0, #ffe9a8);
  border-color: #f0c84a;
}

.death-stat-val {
  font-size: 20px;
  font-weight: 900;
  color: var(--ink);
  line-height: 1.15;
  word-break: break-word;
}

.death-stat-label {
  font-size: 11px;
  font-weight: 800;
  color: var(--ink-soft);
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

.death-stats-chart-wrap {
  background: rgba(255, 255, 255, 0.7);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 10px 10px 8px;
  margin-bottom: 16px;
  text-align: left;
}

.death-stats-chart-title {
  font-size: 12px;
  font-weight: 900;
  color: var(--ink-soft);
  margin-bottom: 6px;
  text-align: center;
}

#death-mass-chart {
  display: block;
  width: 100%;
  height: 120px;
  border-radius: 8px;
}

.death-stats-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.death-stats-actions .death-revive {
  grid-column: 1 / -1;
  background: linear-gradient(180deg, #fff8e8, #ffe7b8);
  border-color: #e8b84a;
  color: #7a4e00;
}

.death-stats-actions .button:disabled {
  opacity: 0.55;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.death-revive-hint {
  margin-top: 8px;
  font-size: 12px;
  font-weight: 700;
  color: var(--ink-soft);
  text-align: center;
  min-height: 1.2em;
}

.ad-progress {
  text-align: center;
  font-size: 12px;
  font-weight: 800;
  color: var(--ink-soft);
  margin: -8px 0 14px;
}

.death-stats-actions .button {
  margin: 0;
}

@media (max-width: 900px), (pointer: coarse) {
  .death-stats-card {
    width: min(420px, 100%);
    padding: 16px 14px 14px;
    border-radius: 22px;
  }
  .death-stats-title { font-size: 22px; }
  .death-stats-sub { font-size: 12px; margin-bottom: 12px; }
  .death-stats-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
  }
  .death-stat:nth-child(5) {
    grid-column: 1 / -1;
  }
  .death-stat-val { font-size: 18px; }
  .death-stat-label { font-size: 10px; }
  #death-mass-chart { height: 100px; }
  .death-stats-actions {
    grid-template-columns: 1fr;
    gap: 8px;
  }
}
