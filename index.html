<body>
    <div id="overlays">
        <div id="helloDialog">
                    <div id="title">
  <span class="slither">slither</span><span class="su">.su</span>
  <div id="hint">When longer, hold the mouse for a speed boost!</div>
</div>
<div class="loger">
                    <input id="nick" class="form-control save" autocomplete="off" placeholder="Ник" data-en-placeholder="Nick" maxlength="16"/>
                    <button type="submit" id="play-btn" onclick="setNick(document.getElementById('nick').value); return false;" class="btn btn-play btn-primary btn-needs-server" data-en="Play">Играть</button>
					</div>

        </div>
		
		
		
<!-- Кнопка шестерёнки в правом верхнем углу -->
<button id="settings-btn" class="settings-icon-btn">
<i class='fa fa-gear'></i>
</button>

<!-- Улучшенная панель настроек (выезжает справа) -->
<div id="settings" class="settings-panel">
    <div class="settings-header">
        <h3>Настройки</h3>
        <button id="close-settings" class="close-btn">✕</button>
    </div>
    
    <div class="settings-content">

        <!-- Чекбоксы -->
        <div class="checkbox-group">
            <label class="setting-item">
                <input type="checkbox" class="save" data-box-id="1" onchange="setSkins(this.checked);">
                <span>Без скинов</span>
            </label>
            
            <label class="setting-item">
                <input type="checkbox" class="save" data-box-id="2" onchange="setNames(!this.checked);">
                <span>Без ников</span>
            </label>
            
            <label class="setting-item">
                <input type="checkbox" class="save" data-box-id="3" onchange="setDarkTheme(this.checked);">
                <span>Тёмная тема</span>
            </label>
            
            <label class="setting-item">
                <input type="checkbox" class="save" data-box-id="4" onchange="setColors(this.checked);">
                <span>Без цветов</span>
            </label>
            
            <label class="setting-item">
                <input type="checkbox" class="save" data-box-id="5" onchange="setShowMass(this.checked);" checked>
                <span>Показывать массу</span>
            </label>
            
            <label class="setting-item">
                <input type="checkbox" class="save" data-box-id="7" onchange="setChatHide(this.checked);">
                <span>Закрыть чат</span>
            </label>
        </div>

        <!-- Скорость -->
        <div class="speed-section">
            <label class="speed-label">
                Скорость: <b id="speedLabel">2 (Normal)</b>
            </label>
            <input 
                type="range" 
                id="speedSlider"
                min="1" 
                max="3" 
                step="1" 
                value="2"
                oninput="setSpeedStage(this.value)"
            >
            <div class="speed-values">
                <span>Медленно</span>
                <span>Нормально</span>
                <span>Быстро</span>
            </div>
        </div>
		
            <button type="button" id="spectate-btn" onclick="setSpect(); return false;" class="btn-spectate">
                Наблюдение
            </button>
		                    <select id="gamemode" class="form-control" onchange="setServer($(this).val());" required>
                        <option value="ffa.agar.su:6009">FFA #1</option>
                    </select>
    </div>
</div>

<h2 data-en="Connecting">Подключение</h2>

        </div>

    <input type="text" id="chat_textbox" autocomplete="off"  placeholder="Нажмите Enter для чата" data-en-placeholder="Press Enter to chat" maxlength="200"/>
	<script>
	// Открытие и закрытие панели
function toggleSettings() {
    document.getElementById('settings').classList.toggle('open');
}

// Закрытие по крестику
document.getElementById('close-settings').onclick = function() {
    document.getElementById('settings').classList.remove('open');
};

// Открытие по кнопке шестерёнки
document.getElementById('settings-btn').onclick = toggleSettings;
(function () {

    var lang = (navigator.language || navigator.userLanguage || "en").toLowerCase();
    var isEnglish = !lang.startsWith("ru");
    if (!isEnglish) return;

    document.querySelectorAll("[data-en]").forEach(el=>{
        el.innerHTML = el.getAttribute("data-en");
    });

    document.querySelectorAll("[data-en-placeholder]").forEach(el=>{
        el.placeholder = el.getAttribute("data-en-placeholder");
    });

    document.querySelectorAll("[data-en-content]").forEach(el=>{
        el.setAttribute("content", el.getAttribute("data-en-content"));
    });

})();
</script>
